name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

env:
  NODE_VERSION: "20.x"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"
          cache-dependency-path: |
            yarn.lock
            client/yarn.lock
            server/yarn.lock

      - name: Install root dependencies
        run: yarn install --frozen-lockfile

      - name: Install client dependencies
        working-directory: ./client
        run: yarn install --frozen-lockfile

      - name: Install server dependencies
        working-directory: ./server
        run: yarn install --frozen-lockfile

      - name: Lint client code
        working-directory: ./client
        run: yarn lint

      - name: Type check client
        working-directory: ./client
        run: npx tsc --noEmit

      - name: Build client
        working-directory: ./client
        run: yarn build

      - name: Check server syntax
        working-directory: ./server
        run: node -c index.js

  test-env-smoke:
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name
      == 'dev')
    environment: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "yarn"
          cache-dependency-path: |
            yarn.lock
            server/yarn.lock

      - name: Install root dependencies
        run: yarn install --frozen-lockfile

      - name: Install server dependencies
        working-directory: ./server
        run: yarn install --frozen-lockfile

      - name: Run server tests
        working-directory: server
        run: yarn test
        env:
          NODE_ENV: test
          JWT_SECRET_KEY: test-secret
          JWT_REFRESH_SECRET_KEY: test-refresh-secret
          JWT_ACCESS_TOKEN_EXPIRATION: 15m
          JWT_REFRESH_TOKEN_EXPIRATION: 1d
          JWT_LOGOUT_TOKEN_EXPIRATION: 1s

      - name: Test server startup
        working-directory: server
        run: timeout 10s yarn start:test
        env:
          NODE_ENV: test
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          JWT_REFRESH_SECRET_KEY: ${{ secrets.JWT_REFRESH_SECRET_KEY }}
          JWT_ACCESS_TOKEN_EXPIRATION: 15m
          JWT_REFRESH_TOKEN_EXPIRATION: 1d
          JWT_LOGOUT_TOKEN_EXPIRATION: 1s

  docker-build:
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        working-directory: ./server
        run: docker build -t expense-manager-backend:test-${{ github.sha }} .

      - name: Test Docker image
        working-directory: ./server
        run: |
          docker run -d --name test-backend -p 4000:4000 \
            -e NODE_ENV=test \
            -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
            -e JWT_SECRET_KEY=test-secret \
            -e JWT_REFRESH_SECRET_KEY=test-refresh-secret \
            -e JWT_ACCESS_TOKEN_EXPIRATION=15m \
            -e JWT_REFRESH_TOKEN_EXPIRATION=1d \
            -e JWT_LOGOUT_TOKEN_EXPIRATION=1s \
            expense-manager-backend:test-${{ github.sha }}
          sleep 10
          docker stop test-backend || true
          docker rm test-backend || true
